<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#111;
    color:#fff;
    font-family:"Microsoft YaHei",sans-serif;
}

.text{
    margin-bottom:20px;
    font-size:20px;
}

.bar{
    width:320px;
    height:10px;
    background:rgba(255,255,255,.15);
    border-radius:999px;
    overflow:hidden;
}

.progress{
    width:0%;
    height:100%;
    background:#4cafef;
    animation:load 0.5s linear forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}
</style>
</head>
<body>

<div class="text">正在进入...</div>

<div class="bar">
    <div class="progress"></div>
</div>

<script>
setTimeout(() => {
    location.replace("https://welcome.chisato.org.cn");
}, 500);
</script>

</body>
</html>
