<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chisato 导航菜单</title>
    <style>
        /* ==================== 基础色彩方案 ==================== */
        :root {
            --bg-color: #fcfcfc;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --card-bg: #ffffff;
            --border-color: #f5f5f7;
            --accent-bili: #fb7299;
            --accent-studio: #00aeec;
            --accent-music: #00c853;
            --overlay: rgba(0, 0, 0, 0.4);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-main: #f5f5f7;
                --text-muted: #6e6e73;
                --card-bg: #1c1c1e;
                --border-color: #2c2c2e;
                --overlay: rgba(0, 0, 0, 0.7);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background-color 0.5s ease, opacity 0.5s ease;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 400px;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .nav-list {
            display: flex;
            flex-direction: column;
            gap: 10px; /* 稍微紧凑一些以容纳更多选项 */
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px; /* 微调内边距，更显精致 */
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:active {
            transform: scale(0.98);
            background-color: var(--border-color);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* SVG 图标通用样式 */
        .icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
        }

        .icon-wrapper svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .label {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .label-title {
            font-size: 15px;
            font-weight: 500;
        }

        .label-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        .arrow {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 300;
        }

        /* 弹窗样式 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-card {
            background: var(--card-bg);
            width: 80%;
            max-width: 280px;
            padding: 22px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .modal-card p {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 22px;
        }

        .modal-btn {
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            border: none;
            background: var(--text-main);
            color: var(--bg-color);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .modal-btn:active {
            opacity: 0.75;
        }

        .btn-secondary {
            background: var(--border-color);
            color: var(--text-main);
            font-weight: 500;
            margin-bottom: 0;
        }

        /* 激活状态 */
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-overlay.show .modal-card {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Chisato Services</h1>
            <p>选择服务以继续</p>
        </div>

        <div class="nav-list">
            
            <div class="nav-item" onclick="openModal('BBS 论坛', '即将前往 Telegram 论坛频道进行交流探讨。', 'https://t.me/ChisatoBBS')">
                <div class="item-info">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="var(--accent-bili)">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <div class="label">
                        <span class="label-title">BBS</span>
                        <span class="label-desc">论坛社区</span>
                    </div>
                </div>
                <span class="arrow">›</span>
            </div>

            <div class="nav-item" onclick="openModal('联系方式', '即将查看详细的联系信息与名片。', 'https://t.me/WaterChisato/1318')">
                <div class="item-info">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="var(--accent-studio)">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <polyline points="17 11 19 13 23 9"></polyline>
                        </svg>
                    </div>
                    <div class="label">
                        <span class="label-title">查看联系方式</span>
                        <span class="label-desc">获取联络详情</span>
                    </div>
                </div>
                <span class="arrow">›</span>
            </div>

            <div class="nav-item" onclick="openModal('天气服务', '查看水水所在地方的天气', 'https://t.me/linkwca')">
                <div class="item-info">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="var(--accent-music)">
                            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                            <circle cx="12" cy="12" r="5"></circle>
                        </svg>
                    </div>
                    <div class="label">
                        <span class="label-title">天气</span>
                        <span class="label-desc">气象预报服务</span>
                    </div>
                </div>
                <span class="arrow">›</span>
            </div>

            <div class="nav-item" onclick="openModal('聊天记录互通', '即将访问群聊同步的聊天群', 'http://tg.chisato.org.cn')">
                <div class="item-info">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="var(--accent-bili)">
                            <polyline points="17 1 21 5 17 9"></polyline>
                            <path d="M3 11V9a4 4 0 0 1 4-4h14M7 23 3 19 7 15"></path>
                            <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                        </svg>
                    </div>
                    <div class="label">
                        <span class="label-title">聊天记录互通</span>
                        <span class="label-desc">群聊聊天记录互通</span>
                    </div>
                </div>
                <span class="arrow">›</span>
            </div>

            <div class="nav-item" onclick="openModal('机器人汇总', '即将查看所有支持的自动化 Bot 列表。', 'https://t.me/cfasebot')">
                <div class="item-info">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="var(--accent-studio)">
                            <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                            <circle cx="12" cy="5" r="2"></circle>
                            <path d="M12 7v4M8 15h.01M16 15h.01"></path>
                        </svg>
                    </div>
                    <div class="label">
                        <span class="label-title">机器人汇总</span>
                        <span class="label-desc">Bot 聚合中心</span>
                    </div>
                </div>
                <span class="arrow">›</span>
            </div>

            <div class="nav-item" onclick="openModal('About me.', '即将跳转至个人陈旧主页了解更多信息。', 'http://chisato.org.cn/oldindex')">
                <div class="item-info">
                    <div class="icon-wrapper">
                        <svg viewBox="0 0 24 24" stroke="var(--accent-music)">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </div>
                    <div class="label">
                        <span class="label-title">About me.</span>
                        <span class="label-desc">个人简介主页</span>
                    </div>
                </div>
                <span class="arrow">›</span>
            </div>

        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 id="modalTitle">提示</h3>
            <p id="modalDescription">确定要跳转吗？</p>
            <button class="modal-btn" onclick="confirmRedirect()">确定前往</button>
            <button class="modal-btn btn-secondary" onclick="closeModal()">取消</button>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('modalOverlay');
        const title = document.getElementById('modalTitle');
        const desc = document.getElementById('modalDescription');
        
        let targetUrl = '';

        function openModal(itemTitle, itemDesc, url) {
            title.textContent = itemTitle;
            desc.textContent = itemDesc;
            targetUrl = url;
            overlay.classList.add('show');
        }

        function closeModal() {
            overlay.classList.remove('show');
        }

        function confirmRedirect() {
            if (targetUrl) {
                window.location.href = targetUrl;
            }
            closeModal();
        }
    </script>
</body>
</html>
